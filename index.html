<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>融智产品考核看板</title>
<style>
:root{
  --green:#10b981;--green2:#059669;--green-bg:rgba(16,185,129,.07);--green-border:rgba(16,185,129,.18);
  --orange:#f59e0b;--orange2:#d97706;--orange-bg:rgba(245,158,11,.07);--orange-border:rgba(245,158,11,.18);
  --red:#ef4444;--red-bg:rgba(239,68,68,.06);--red-border:rgba(239,68,68,.12);
  --blue:#3b82f6;--blue2:#2563eb;--blue-bg:rgba(59,130,246,.06);
  --purple:#8b5cf6;--purple-bg:rgba(139,92,246,.06);
  --gray:#64748b;--gray-light:#94a3b8;--gray-bg:#f8fafc;--gray-100:#f1f5f9;
  --dark:#0f172a;--dark2:#1e293b;
  --card-bg:#fff;
  --radius:14px;--radius-sm:10px;--radius-xs:8px;
  --shadow:0 1px 2px rgba(0,0,0,.04),0 1px 4px rgba(0,0,0,.03);
  --shadow-md:0 4px 12px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12);
  --transition:all .2s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","SF Pro Display","Helvetica Neue","Noto Sans SC",sans-serif;background:#f0f2f5;color:var(--dark2);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.num{font-family:"DIN Alternate","SF Mono",Menlo,Consolas,"Courier New",monospace;font-variant-numeric:tabular-nums}

/* ══════════════════════════════════════
   Login Page
   ══════════════════════════════════════ */
.login-page{min-height:100vh;background:linear-gradient(160deg,#0f172a 0%,#1e293b 40%,#334155 100%);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.login-page::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.15),transparent 70%);top:-200px;right:-100px;pointer-events:none}
.login-page::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.12),transparent 70%);bottom:-100px;left:-50px;pointer-events:none}
.login-box{background:rgba(255,255,255,.97);backdrop-filter:blur(24px);border-radius:20px;padding:44px 36px;width:100%;max-width:360px;box-shadow:var(--shadow-lg);position:relative;z-index:1}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .icon{font-size:36px;display:block;margin-bottom:8px}
.login-logo h1{font-size:20px;font-weight:700;color:var(--dark);letter-spacing:-.3px}
.login-logo .sub{font-size:13px;color:var(--gray-light);margin-top:4px}
.form-g{margin-bottom:16px}
.form-g label{display:block;font-size:12px;font-weight:600;color:var(--gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-g input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:var(--radius-sm);font-size:14px;outline:none;transition:var(--transition);background:var(--gray-bg);color:var(--dark)}
.form-g input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,.08)}
.form-g input::placeholder{color:#cbd5e1}
.btn-login{width:100%;padding:12px;background:var(--dark);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:var(--transition);margin-top:4px}
.btn-login:hover{background:var(--dark2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(15,23,42,.2)}
.btn-login:active{transform:translateY(0)}
.err{color:var(--red);text-align:center;font-size:12px;margin-bottom:12px;padding:8px 12px;background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--radius-xs);display:none}

/* ══════════════════════════════════════
   Header
   ══════════════════════════════════════ */
.header{background:var(--dark);color:#fff;padding:14px 20px 0;position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.header h1{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;letter-spacing:-.2px}
.hdr-icon{font-size:18px}
.hdr-date{color:rgba(255,255,255,.4);font-size:11px}
.hdr-right{display:flex;align-items:center;gap:10px}
.btn-logout{padding:4px 10px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border:none;border-radius:6px;font-size:11px;cursor:pointer;transition:var(--transition)}
.btn-logout:hover{background:rgba(255,255,255,.18);color:#fff}

/* Quarter Tabs */
.q-tabs{display:flex;gap:3px;padding-bottom:10px}
.q-tab{padding:5px 14px;border:none;background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:var(--transition)}
.q-tab:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)}
.q-tab.active{background:rgba(255,255,255,.2);color:#fff}

/* Main Tabs */
.main-tabs{display:flex;background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;z-index:90}
.main-tab{flex:1;padding:12px 0;text-align:center;font-size:13px;font-weight:600;color:var(--gray-light);cursor:pointer;transition:var(--transition);border-bottom:2px solid transparent}
.main-tab:hover{color:var(--gray);background:rgba(0,0,0,.01)}
.main-tab.active{color:var(--dark);border-bottom-color:var(--blue)}
.main-tab .tab-icon{font-size:14px;margin-right:3px}

/* ══════════════════════════════════════
   Container
   ══════════════════════════════════════ */
.container{padding:12px 12px 0;max-width:1100px;margin:0 auto}

/* Branch Info Bar */
.branch-info{background:var(--card-bg);border-radius:var(--radius);padding:12px 16px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center}
.branch-info-name{font-size:14px;font-weight:700;color:var(--dark);display:flex;align-items:center;gap:6px}
.branch-info-date{font-size:11px;color:var(--gray-light);font-weight:500}

/* Branch Label (admin mode) */
.branch-label{margin-bottom:6px;padding:6px 0;font-size:13px;font-weight:700;color:var(--gray);display:flex;align-items:center;gap:6px}
.branch-label span{font-size:14px}

/* Search Bar */
.search-bar{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:8px 12px;margin-bottom:10px;display:flex;gap:8px;align-items:center}
.search-bar input{flex:1;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:var(--radius-xs);font-size:13px;outline:none;transition:var(--transition);background:var(--gray-bg)}
.search-bar input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 2px rgba(59,130,246,.06)}
.search-hint{font-size:10px;color:#cbd5e1;white-space:nowrap}

/* ══════════════════════════════════════
   Product Card
   ══════════════════════════════════════ */
.product-card{background:var(--card-bg);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden;transition:var(--transition);border:1px solid transparent}
.product-card:hover{box-shadow:var(--shadow-md);border-color:#e2e8f0}
.product-header{padding:12px 16px 8px;display:flex;align-items:center;gap:10px}
.product-icon{font-size:20px;width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.product-icon.cz{background:linear-gradient(135deg,#dbeafe,#eff6ff)}
.product-icon.xgj{background:linear-gradient(135deg,#fef3c7,#fffbeb)}
.product-icon.zcc{background:linear-gradient(135deg,#d1fae5,#ecfdf5)}
.product-icon.zy{background:linear-gradient(135deg,#ede9fe,#f5f3ff)}
.product-icon.zjg{background:linear-gradient(135deg,#fce7f3,#fdf2f8)}
.product-name{font-size:14px;font-weight:700;color:var(--dark)}
.product-full{font-size:10px;color:var(--gray-light);margin-top:1px}

/* Metric Flow */
.metric-flow{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 16px}
.metric-box{text-align:center;padding:8px 12px;background:var(--gray-bg);border-radius:var(--radius-xs);min-width:72px}
.metric-box .lbl{display:block;font-size:10px;color:var(--gray-light);margin-bottom:3px;font-weight:500}
.metric-box .val{display:block;font-size:24px;font-weight:800;color:var(--dark);line-height:1}
.metric-arrow{font-size:16px;color:#d1d5db;font-weight:300}
.metric-target{background:linear-gradient(135deg,#dbeafe,#eff6ff);border:1.5px solid #93c5fd}

/* Progress Bar */
.progress-wrap{padding:4px 16px 12px;display:flex;align-items:center;gap:8px}
.progress-bar{flex:1;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.progress-pct{font-size:14px;font-weight:800;min-width:42px;text-align:right}

/* Net + Target + Badge */
.net-row{display:flex;align-items:center;padding:0 16px 12px;gap:12px;flex-wrap:wrap}
.net-item{display:flex;align-items:center;gap:5px}
.net-label{font-size:11px;color:var(--gray-light);font-weight:500}
.net-val{font-size:16px;font-weight:800}
.c-green{color:var(--green) !important}
.c-red{color:var(--red) !important}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-yellow{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border)}
.badge-gray{background:var(--gray-100);color:var(--gray-light);border:1px solid #e2e8e8}

/* ══════════════════════════════════════
   Team Cards
   ══════════════════════════════════════ */
.team-card{background:var(--card-bg);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden;transition:var(--transition);border:1px solid transparent}
.team-card:hover{box-shadow:var(--shadow-md);border-color:#e2e8f0}
.team-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;transition:var(--transition)}
.team-header:hover{background:rgba(0,0,0,.01)}
.team-name{font-size:13px;font-weight:700;color:var(--dark);display:flex;align-items:center;gap:6px}
.team-name .icon{font-size:14px}
.team-badges{display:flex;gap:5px;align-items:center}
.team-stat{font-size:10px;color:var(--gray);padding:2px 7px;background:var(--gray-bg);border-radius:20px;font-weight:500}
.arrow{transition:transform .3s ease;font-size:10px;color:#cbd5e1}
.team-card.open .arrow{transform:rotate(180deg)}
.team-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1)}
.team-card.open .team-body{max-height:8000px;padding:0 16px 16px}

/* Team Section Title */
.team-section-title{font-size:12px;font-weight:700;color:var(--gray);margin:10px 0 6px;display:flex;align-items:center;gap:5px}

/* Team Product Row */
.team-prod-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--gray-bg);border-radius:var(--radius-xs);margin-bottom:6px;flex-wrap:wrap}
.tp-icon{font-size:15px;flex-shrink:0}
.tp-name{font-weight:700;min-width:60px;color:var(--dark);font-size:12px}
.tp-detail{flex:1;color:var(--gray);font-size:11px;line-height:1.5}
.tp-detail strong{color:var(--dark);font-weight:700}
.tp-rate{font-weight:800;font-size:13px;min-width:40px;text-align:right}

/* Ice Detail Table */
.ice-detail-section{margin-top:10px}
.ice-detail-title{font-size:12px;font-weight:700;color:var(--gray);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.ice-table{width:100%;border-collapse:collapse;font-size:11px}
.ice-table th{background:var(--gray-100);padding:6px 6px;text-align:center;font-weight:600;color:var(--gray);border-bottom:1px solid #e2e8f0;font-size:10px;text-transform:uppercase;letter-spacing:.3px}
.ice-table td{padding:5px 6px;text-align:center;border-bottom:1px solid #f1f5f9}
.ice-table tbody tr:hover{background:rgba(0,0,0,.01)}
.emp-name{font-weight:600;text-align:left !important;color:var(--dark)}
.ice-done{color:var(--green);font-weight:700}
.ice-wait{color:var(--orange);font-weight:700}
.ice-no{color:#d1d5db}
.ice-legend{display:flex;gap:12px;margin-top:6px;font-size:10px;color:var(--gray-light)}
.ice-legend span{display:flex;align-items:center;gap:3px}

/* ══════════════════════════════════════
   Footer
   ══════════════════════════════════════ */
.footer-section{margin:10px 12px 24px;padding:16px;background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);max-width:1100px;margin-left:auto;margin-right:auto;border:1px solid #f1f5f9}
.footer-title{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.footer-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.footer-col-title{font-size:12px;font-weight:700;color:var(--dark2);margin-bottom:6px}
.footer-item{font-size:11px;color:var(--gray);line-height:1.7}
.footer-item strong{color:var(--dark2);font-weight:600}

/* ══════════════════════════════════════
   Utility
   ══════════════════════════════════════ */
.dim{opacity:.08;pointer-events:none}
.hl{box-shadow:0 0 0 2px var(--blue) !important;border-color:var(--blue) !important}
.empty-state{text-align:center;padding:40px 20px;color:var(--gray-light)}
.empty-state .empty-icon{font-size:40px;margin-bottom:8px;opacity:.5}
.empty-state p{font-size:13px}

/* ══════════════════════════════════════
   Responsive
   ══════════════════════════════════════ */
@media(max-width:768px){
  .header{padding:10px 16px 0}
  .header h1{font-size:14px}
  .main-tab{padding:10px 0;font-size:12px}
  .container{padding:8px 8px 0}
  .footer-section{margin:8px 8px 20px}
  .footer-grid{grid-template-columns:1fr}
  .metric-box .val{font-size:20px}
  .product-card{margin-bottom:8px}
  .team-card{margin-bottom:8px}
}
@media(max-width:480px){
  .header-top{flex-direction:column;gap:4px;text-align:center}
  .hdr-right{justify-content:center}
  .net-row{gap:8px}
  .team-prod-row{gap:6px}
  .tp-name{min-width:50px}
}
</style>
</head>

function qTarget(q,t){if(!t)return 0;switch(q){case'Q1':return t.Q1||0;case'Q2':return t.Q2||0;case'Q3':return t.Q3||0;default:return t.Q4||0;}}
function qNetTarget(q,t){if(!t)return 0;if(t['净增'+q]!==undefined)return t['净增'+q]||0;if(t.净增目标!==undefined)return t.净增目标||0;var qt=qTarget(q,t);return qt-(t.年初||0);}
function pct(v,t){return t>0?Math.round(v/t*100):0;}
function rc(r){if(r>=100)return'#10b981';if(r>=60)return'#f59e0b';return'#ef4444';}
function badge(s){if(s==='达标')return'<span class="badge badge-green">✅ 达标</span>';if(s==='未达标')return'<span class="badge badge-yellow">⚠️ 未达标</span>';return'<span class="badge badge-gray">⬜ 无任务</span>';}
function progressHTML(rate){var c=rc(rate);return'<div class="progress-bar"><div class="progress-fill" style="width:'+Math.min(rate,100)+'%;background:'+c+'"></div></div><span class="progress-pct num" style="color:'+c+'">'+rate+'%</span>';}

function buildProductCard(prod,vd,vt,id,it,mode){
  var h='<div class="product-card">';
  h+='<div class="product-header"><div class="product-icon "+PCLASS[prod]+"">'+PICON[prod]+'</div><div><div class="product-name">'+PLABELS[prod]+'</div><div class="product-full">'+PLABELS[prod]+'考核</div></div></div>';

  if(mode==='value'){
    var vs=vt?(vt.年初||0):0;
    var vc=vd?(vd.当前||0):0;
    var vn=vd?(vd.净增||0):0;
    var vnt=vt?qNetTarget(CUR_Q,vt):(vd?(vd.目标||0):0);
    var vabs=vs+vnt;
    var vr=pct(vn,vnt);
    var vst=vd?(vd.状态||''):'';
    h+='<div class="metric-flow">';
    h+='<div class="metric-box"><span class="lbl">年初</span><span class="val num">'+vs+'</span></div>';
    h+='<span class="metric-arrow">→</span>';
    h+='<div class="metric-box"><span class="lbl">目前</span><span class="val num">'+vc+'</span></div>';
    h+='<span class="metric-arrow">→</span>';
    h+='<div class="metric-box metric-target"><span class="lbl">目标</span><span class="val num">'+vabs+'</span></div>';
    h+='</div>';
    h+='<div class="net-row">';
    h+='<div class="net-item"><span class="net-label">已净增</span><span class="net-val num '+(vn>=0?'c-green':'c-red')+'">'+(vn>=0?'+':'')+vn+'</span></div>';
    h+='<div class="net-item"><span class="net-label">净增目标</span><span class="net-val num">'+vnt+'</span></div>';
    if(vst)h+=badge(vst);
    h+='</div>';
    h+='<div class="progress-wrap">'+progressHTML(vr)+'</div>';
  }

  if(mode==='ice'){
    var is2=it?(it.已破冰||0):(id?(id.年初||0):0);
    var ic=id?(id.当前||0):(it?(it.已破冰||0):0);
    var in2=id?(id.净增||0):0;
    var int2=it?(it.净增||0):(id?(id.净增目标||0):0);
    var iabs=is2+int2;
    var ir=pct(in2,int2);
    var ist=id?(id.状态||''):'';
    h+='<div class="metric-flow">';
    h+='<div class="metric-box"><span class="lbl">年初</span><span class="val num">'+is2+'</span></div>';
    h+='<span class="metric-arrow">→</span>';
    h+='<div class="metric-box"><span class="lbl">目前</span><span class="val num">'+ic+'</span></div>';
    h+='<span class="metric-arrow">→</span>';
    h+='<div class="metric-box metric-target"><span class="lbl">目标</span><span class="val num">'+iabs+'</span></div>';
    h+='</div>';
    h+='<div class="net-row">';
    h+='<div class="net-item"><span class="net-label">已净增</span><span class="net-val num '+(in2>=0?'c-green':'c-red')+'">'+(in2>=0?'+':'')+in2+'</span></div>';
    h+='<div class="net-item"><span class="net-label">净增目标</span><span class="net-val num">'+int2+'</span></div>';
    if(ist)h+=badge(ist);
    h+='</div>';
    h+='<div class="progress-wrap">'+progressHTML(ir)+'</div>';
  }

  h+='</div>';
  return h;
}

function showDash(){
  var sq=sessionStorage.getItem('q');if(sq)CUR_Q=sq;
  var u=sessionStorage.getItem('u');var branch=sessionStorage.getItem('branch');var role=sessionStorage.getItem('role');
  if(!u){location.reload();return;}
  document.getElementById('loginPage').style.display='none';
  var dp=document.getElementById('dashPage');dp.style.display='block';
  var isAdmin=role==='admin';
  var branches=isAdmin?Object.keys(DATA):[branch];
  var h='';

  // Header
  h+='<div class="header">';
  h+='<div class="header-top">';
  h+='<div><h1><span class="hdr-icon">📊</span> 融智产品考核看板</h1></div>';
  h+='<div class="hdr-right"><span class="hdr-date">数据更新 '+UPDATE_DATE+'</span><button class="btn-logout" onclick="doLogout()">退出</button></div>';
  h+='</div>';
  h+='<div class="q-tabs">';
  h+='<span style="color:rgba(255,255,255,.35);font-size:11px;padding:5px 6px 5px 0">考核目标：</span>';
  ['Q1','Q2','Q3','Q4'].forEach(function(q){h+='<button class="q-tab'+(q===CUR_Q?' active':'')+'" onclick="switchQ(\''+q+'\')">'+q+'目标</button>';});
  h+='</div></div>';

  // Main Tabs
  h+='<div class="main-tabs">';
  h+='<div class="main-tab'+(CUR_TAB==='value'?' active':'')+'" onclick="switchTab(\'value\')"><span class="tab-icon">💎</span>有价值</div>';
  h+='<div class="main-tab'+(CUR_TAB==='ice'?' active':'')+'" onclick="switchTab(\'ice\')"><span class="tab-icon">🧊</span>破冰</div>';
  h+='<div class="main-tab'+(CUR_TAB==='team'?' active':'')+'" onclick="switchTab(\'team\')"><span class="tab-icon">👥</span>团队</div>';
  h+='<div class="main-tab'+(CUR_TAB==='rank'?' active':'')+'" onclick="switchTab(\'rank\')"><span class="tab-icon">🏆</span>'+(isAdmin?'总览 & 排名':'行内排名')+'</div>';
  h+='</div>';

  h+='<div class="container">';

  if(CUR_TAB==='value'){
    h+='<div class="branch-info"><div class="branch-info-name">🏢 '+(isAdmin?'全部支行':branch)+'</div><div class="branch-info-date">'+CUR_Q+'目标 · 有价值客户</div></div>';
    branches.forEach(function(b){
      var d=DATA[b];if(!d)return;
      var prods=[];
      PRODUCTS.forEach(function(prod){
        var vd=(d.value||{})[prod]||null;
        var vt=(d.value_targets||{})[prod]||null;
        if(vd||vt)prods.push(prod);
      });
      if(prods.length===0)return;
      if(isAdmin){
        h+='<div class="branch-label"><span>🏢</span>'+b+'</div>';
      }
      prods.forEach(function(prod){
        var vd=(d.value||{})[prod]||null;
        var vt=(d.value_targets||{})[prod]||null;
        h+=buildProductCard(prod,vd,vt,null,null,'value');
      });
    });

  }else if(CUR_TAB==='ice'){
    h+='<div class="branch-info"><div class="branch-info-name">🏢 '+(isAdmin?'全部支行':branch)+'</div><div class="branch-info-date">'+CUR_Q+'目标 · 破冰口径</div></div>';
    branches.forEach(function(b){
      var d=DATA[b];if(!d)return;
      var prods=[];
      PRODUCTS.forEach(function(prod){
        var id=(d.ice||{})[prod]||null;
        var it=(d.ice_targets||{})[prod]||null;
        if(id||it)prods.push(prod);
      });
      if(prods.length===0)return;
      if(isAdmin){
        h+='<div class="branch-label"><span>🏢</span>'+b+'</div>';
      }
      prods.forEach(function(prod){
        var id=(d.ice||{})[prod]||null;
        var it=(d.ice_targets||{})[prod]||null;
        h+=buildProductCard(prod,null,null,id,it,'ice');
      });
    });

  }else{
    h+='<div class="branch-info"><div class="branch-info-name">🏢 '+(isAdmin?'全部支行':branch)+'</div><div class="branch-info-date">'+CUR_Q+'目标 · 团队完成情况</div></div>';
    h+='<div class="search-bar"><input type="text" id="teamSearch" placeholder="🔍 搜索团队或客户经理..." oninput="filterTeam()"><span class="search-hint" id="teamHint">输入关键词实时筛选</span></div>';

    branches.forEach(function(b){
      var d=DATA[b];if(!d)return;
      var teams=d.teams||{};var tk=Object.keys(teams);
      if(tk.length===0)return;
      if(isAdmin){
        h+='<div class="branch-label"><span>🏢</span>'+b+'</div>';
      }
      tk.forEach(function(tn){
        var td=teams[tn];
        var vtCnt=0,itCnt=0;
        var tvd=td.value||{};var tvt=td.value_targets||{};
        PRODUCTS.forEach(function(prod){
          var pvd=tvd[prod];var pvt=tvt[prod];
          if(!pvd&&!pvt)return;
          var n=pvd?(pvd.净增||0):0;
          var nt=pvt?qNetTarget(CUR_Q,pvt):(pvd?(pvd.目标||0):0);
          if(nt>0&&n>=nt)vtCnt++;
        });
        var ice=td.ice_details||[];
        ice.forEach(function(emp){
          var ok=0;
          ['财资','薪管家','资产池','智园','住管家'].forEach(function(p){if(emp[p]==='done')ok++;});
          if(ok>0)itCnt++;
        });

        h+='<div class="team-card" data-team="'+tn+'">';
        h+='<div class="team-header" onclick="this.parentElement.classList.toggle(\'open\')">';
        h+='<div class="team-name"><span class="icon">👥</span> '+tn+'</div>';
        h+='<div class="team-badges">';
        h+='<span class="team-stat">💎 有价值达标 '+vtCnt+'</span>';
        h+='<span class="team-stat">🧊 破冰达标 '+itCnt+'</span>';
        h+='<span class="arrow">▼</span></div></div>';
        h+='<div class="team-body">';

        h+='<div class="team-section-title">💎 有价值完成情况</div>';
        PRODUCTS.forEach(function(prod){
          var pvd=tvd[prod];var pvt=tvt[prod];
          if(!pvd&&!pvt)return;
          var vs=pvd?(pvd.年初||0):0;
          var vc=pvd?(pvd.当前||0):0;
          var vn=pvd?(pvd.净增||0):0;
          var tnt=pvt?qNetTarget(CUR_Q,pvt):(pvd?(pvd.目标||0):0);
          var tabs=vs+tnt;
          var vr=pct(vn,tnt);
          var tst=pvd?(pvd.状态||''):'';
          h+='<div class="team-prod-row" style="flex-wrap:wrap;gap:6px">';
          h+='<span class="tp-icon">'+PICON[prod]+'</span>';
          h+='<span class="tp-name">'+PLABELS[prod]+'</span>';
          h+='<span class="tp-detail">年初<strong>'+vs+'</strong> → 目前<strong>'+vc+'</strong> → 目标<strong>'+tabs+'</strong>  已净增<strong style="color:'+(vn>=0?'#10b981':'#ef4444')+'">'+(vn>=0?'+':'')+vn+'</strong> / 净增目标'+tnt+'</span>';
          h+='<span class="tp-rate num" style="color:'+rc(vr)+'">'+vr+'%</span>';
          if(tst)h+=badge(tst);
          h+='</div>';
        });

        h+='<div class="team-section-title" style="margin-top:12px">🧊 破冰完成情况</div>';
        var teamIce={};
        ice.forEach(function(emp){
          ['财资','薪管家','资产池','智园','住管家'].forEach(function(p){
            if(emp[p]==='done')teamIce[p]=(teamIce[p]||0)+1;
          });
        });
        ['财资','薪管家','资产池','智园','住管家'].forEach(function(prod){
          var cnt=teamIce[prod]||0;
          h+='<div class="team-prod-row">';
          h+='<span class="tp-icon">'+PICON[prod]+'</span>';
          h+='<span class="tp-name">'+PLABELS[prod]+'</span>';
          h+='<span class="tp-detail">已破冰 <strong>'+cnt+'</strong> 人</span>';
          h+='</div>';
        });

        if(ice.length>0){
          h+='<div class="ice-detail-section"><div class="ice-detail-title">📋 客户经理破冰明细</div>';
          h+='<div style="overflow-x:auto"><table class="ice-table"><thead><tr><th>姓名</th><th>到岗月</th><th>资质</th><th>财资</th><th>薪管家</th><th>资产池</th><th>智园</th><th>住管家</th></tr></thead><tbody>';
          ice.forEach(function(emp){
            h+='<tr><td class="emp-name">'+emp.name+'</td><td>'+emp.months+'</td><td>'+emp.qual+'</td>';
            ['财资','薪管家','资产池','智园','住管家'].forEach(function(p){
              var s=emp[p];
              if(s==='done')h+='<td class="ice-done">✅</td>';
              else if(s==='eligible')h+='<td class="ice-wait">⏳</td>';
              else h+='<td class="ice-no">—</td>';
            });
            h+='</tr>';
          });
          h+='</tbody></table></div><div class="ice-legend"><span>✅ 已破冰</span><span>⏳ 条件满足待破冰</span><span>— 条件不满足</span></div></div>';
        }

        h+='</div></div>';
      });
    });
  }

  // ===== 排名 Tab (Admin only) =====
  if(CUR_TAB==='rank' && isAdmin){
    h+='<div class="branch-info"><div class="branch-info-name">🏆 全行排名</div><div class="branch-info-date">'+CUR_Q+'目标 · 支行 & 团队</div></div>';

    // ---- Collect branch ranking data ----
    var rankData={};
    PRODUCTS.forEach(function(prod){rankData[prod]={branches:[],teams:[]};});

    branches.forEach(function(b){
      var d=DATA[b];if(!d)return;
      PRODUCTS.forEach(function(prod){
        // Value
        var vd=(d.value||{})[prod]||null;
        var vt=(d.value_targets||{})[prod]||null;
        if(vd||vt){
          var vs=vt?(vt.年初||0):0;
          var vc=vd?(vd.当前||0):0;
          var vn=vd?(vd.净增||0):0;
          var nt=vt?qNetTarget(CUR_Q,vt):(vd?(vd.目标||0):0);
          var rate=pct(vn,nt);
          rankData[prod].branches.push({name:b,start:vs,current:vc,net:vn,target:nt,rate:rate});
        }
        // Ice
        var id=(d.ice||{})[prod]||null;
        var it=(d.ice_targets||{})[prod]||null;
        if(id||it){
          var is2=it?(it.年初||0):(id?(id.年初||0):0);
          var ic=id?(id.当前||0):(it?(it.年初||0):0);
          var in2=id?(id.净增||0):0;
          var int2=it?(it.净增目标||it.净增||0):(id?(id.净增目标||0):0);
          var ir=pct(in2,int2);
          rankData[prod].branches.push({name:b,start:is2,current:ic,net:in2,target:int2,rate:ir});
        }
      });
      // ---- Collect team ranking data ----
      var teams=d.teams||{};
      Object.keys(teams).forEach(function(tn){
        var td=teams[tn];
        var tvd=td.value||{};var tvt=td.value_targets||{};
        PRODUCTS.forEach(function(prod){
          var pvd=tvd[prod];var pvt=tvt[prod];
          if(!pvd&&!pvt)return;
          var vs=pvd?(pvd.年初||0):0;
          var vc=pvd?(pvd.当前||0):0;
          var vn=pvd?(pvd.净增||0):0;
          var nt=pvt?qNetTarget(CUR_Q,pvt):(pvd?(pvd.目标||0):0);
          var rate=pct(vn,nt);
          rankData[prod].teams.push({name:tn,branch:b,start:vs,current:vc,net:vn,target:nt,rate:rate});
        });
        // Team ice
        var ice=td.ice_details||[];
        var teamIce={};
        ice.forEach(function(emp){
          PRODUCTS.forEach(function(p){if(emp[p]==='done')teamIce[p]=(teamIce[p]||0)+1;});
        });
        PRODUCTS.forEach(function(prod){
          var cnt=teamIce[prod]||0;
          if(cnt>0||pvt)rankData[prod].teams.push({name:tn,branch:b,start:0,current:cnt,net:cnt,target:0,rate:0,isIce:true});
        });
      });
    });

    // ---- Helper: render a ranking table ----
    function renderRankTable(list,labelCol,labelName,isTeam){
      var o='';
      o+='<table style="width:100%;font-size:12px;border-collapse:collapse">';
      o+='<thead><tr style="background:rgba(0,0,0,.03)">';
      o+='<th style="padding:6px 8px;text-align:left">排名</th>';
      o+='<th style="padding:6px 8px;text-align:left">'+labelName+'</th>';
      if(isTeam)o+='<th style="padding:6px 8px;text-align:left">支行</th>';
      o+='<th style="padding:6px 8px;text-align:right">年初</th>';
      o+='<th style="padding:6px 8px;text-align:right">目前</th>';
      o+='<th style="padding:6px 8px;text-align:right">净增</th>';
      o+='<th style="padding:6px 8px;text-align:right">目标</th>';
      o+='<th style="padding:6px 8px;text-align:right">完成率</th>';
      o+='</tr></thead><tbody>';
      list.forEach(function(r,i){
        var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
        o+='<tr style="border-bottom:1px solid rgba(0,0,0,.05)">';
        o+='<td style="padding:6px 8px">'+medal+'</td>';
        o+='<td style="padding:6px 8px">'+r.name+'</td>';
        if(isTeam)o+='<td style="padding:6px 8px;color:#94a3b8">'+r.branch+'</td>';
        o+='<td style="padding:6px 8px;text-align:right">'+r.start+'</td>';
        o+='<td style="padding:6px 8px;text-align:right">'+r.current+'</td>';
        o+='<td style="padding:6px 8px;text-align:right;color:'+(r.net>=0?'#10b981':'#ef4444')+'">'+(r.net>=0?'+':'')+r.net+'</td>';
        o+='<td style="padding:6px 8px;text-align:right">'+r.target+'</td>';
        o+='<td style="padding:6px 8px;text-align:right;font-weight:600;color:'+rc(r.rate)+'">'+r.rate+'%</td>';
        o+='</tr>';
      });
      o+='</tbody></table>';
      return o;
    }

    // ---- Render per-product rankings ----
    PRODUCTS.forEach(function(prod){
      var bList=rankData[prod].branches;
      var tList=rankData[prod].teams.filter(function(x){return !x.isIce;});
      if(bList.length===0&&tList.length===0)return;

      var byRate=bList.slice().sort(function(a,b){return b.rate-a.rate;});
      var byNet=bList.slice().sort(function(a,b){return b.net-a.net;});
      var tByRate=tList.slice().sort(function(a,b){return b.rate-a.rate;});
      var tByNet=tList.slice().sort(function(a,b){return b.net-a.net;});

      h+='<div class="product-card" style="margin:12px 0">';
      h+='<div class="product-header"><div class="product-icon '+PCLASS[prod]+'">'+PICON[prod]+'</div><div><div class="product-name">'+PLABELS[prod]+'</div><div class="product-full">排名</div></div></div>';

      // Branch rankings
      if(byRate.length>0){
        h+='<div style="padding:12px 16px 0"><div style="font-size:13px;font-weight:600;color:#64748b;margin-bottom:8px">🏢 支行 · 完成率排名</div>';
        h+=renderRankTable(byRate,'支行','支行',false);
        h+='</div>';
        h+='<div style="padding:12px 16px 0"><div style="font-size:13px;font-weight:600;color:#64748b;margin-bottom:8px">🏢 支行 · 净增绝对数排名</div>';
        h+=renderRankTable(byNet,'支行','支行',false);
        h+='</div>';
      }

      // Team rankings
      if(tByRate.length>0){
        h+='<div style="padding:12px 16px 0;border-top:1px solid #f1f5f9;margin-top:4px"><div style="font-size:13px;font-weight:600;color:#64748b;margin-bottom:8px">👥 团队 · 完成率排名</div>';
        h+=renderRankTable(tByRate,'团队','团队',true);
        h+='</div>';
        h+='<div style="padding:12px 16px"><div style="font-size:13px;font-weight:600;color:#64748b;margin-bottom:8px">👥 团队 · 净增绝对数排名</div>';
        h+=renderRankTable(tByNet,'团队','团队',true);
        h+='</div>';
      }

      h+='</div>';
    });
  }

  h+='</div>';

  h+='<div class="footer-section"><div class="footer-title">📌 考核口径说明</div><div class="footer-grid">';
  h+='<div class="footer-col"><div class="footer-col-title">🧊 破冰口径</div>';
  h+='<div class="footer-item"><strong>鲤想财资：</strong>到岗≥36月客户经理完成财资安装并转账1笔</div>';
  h+='<div class="footer-item"><strong>鲤想薪管家：</strong>到岗≥24月客户经理完成薪管家注册并导入20个员工</div>';
  h+='<div class="footer-item"><strong>锦鲤资产池：</strong>调查资质≥三级客户经理完成一笔资产池签约</div>';
  h+='<div class="footer-item"><span style="color:#94a3b8">智园、住管家暂无破冰考核</span></div>';
  h+='</div>';
  h+='<div class="footer-col"><div class="footer-col-title">💎 有价值口径</div>';
  h+='<div class="footer-item"><strong>鲤想财资：</strong>集团≥2公司 + 当年月均支付≥5笔</div>';
  h+='<div class="footer-item"><strong>鲤想薪管家：</strong>员工≥20人 + 代发达标≥3次/有效团办≥5户</div>';
  h+='<div class="footer-item"><strong>锦鲤资产池：</strong>入池≥1次+月日均≥1万 / 用信≥1次</div>';
  h+='<div class="footer-item"><strong>鲤想智园：</strong>智园有价值客户标准</div>';
  h+='<div class="footer-item"><strong>鲤想住管家：</strong>住管家有价值客户标准</div>';
  h+='</div></div></div>';

  dp.innerHTML=h;

  // Dynamic sticky positioning: set main-tabs top = header height
  var hdr=dp.querySelector('.header');
  var mt=dp.querySelector('.main-tabs');
  if(hdr&&mt){mt.style.top=hdr.offsetHeight+'px';}
}

function filterTeam(){
  var kw=document.getElementById('teamSearch').value.trim().toLowerCase();
  var cards=document.querySelectorAll('.team-card');
  var total=0,match=0;
  cards.forEach(function(c){
    total++;
    var txt=c.textContent.toLowerCase();
    if(!kw||txt.indexOf(kw)!==-1){
      c.style.display='';c.classList.remove('dim');
      if(kw){c.classList.add('hl');c.classList.add('open');}else{c.classList.remove('hl');}
      match++;
    }else{c.classList.add('dim');c.classList.remove('hl');}
  });
  var hint=document.getElementById('teamHint');
  if(hint)hint.textContent=kw?'匹配 '+match+'/'+total+' 个':'输入关键词实时筛选';
}

if(sessionStorage.getItem('u'))showDash();

</script>
</body>
</html>
